    const addDays = (dateStr, n) => {

      const dt = new Date(y, m - 1, d + n);
      return dt.toISOString().split("T")[0];
    };

    // TODAY'S REPORT GENERATOR
    // ─────────────────────────────────────────────
    const generateTodayReport = (clients, cfg, industryKey) => {
      const today = todayISO();
      const urgent = [], important = [], growth = [], leads = [];

      // Due / overdue reminders
      clients.forEach(c => {
        (c.reminders || []).forEach(r => {
          if (r.nextFire <= today) urgent.push(`${c.name} — ${r.description || "Reminder due"}`);
        });
      });

      // New leads not yet contacted
      const newLeads = clients.filter(c => c.stage === "New Lead");
      if (newLeads.length > 0)
        urgent.push(`Respond to ${newLeads.length} new lead${newLeads.length > 1 ? "s" : ""} — speed to lead wins deals`);

      // Pending payments
      const pendingPay = clients.filter(c =>
        ["Invoice Sent","Completed","Gallery Delivered","Deal Signed","Delivery Scheduled"].includes(c.stage)
      );
      if (pendingPay.length > 0) {
        const total = pendingPay.reduce((s, c) => s + Number(c.value || 0), 0);
        urgent.push(`Collect payment from ${pendingPay.length} ${cfg.clientWord.toLowerCase()}${pendingPay.length > 1 ? "s" : ""} — $${total.toLocaleString()} outstanding`);
      }

      // Stale proposals / estimates
      const staleProposals = clients.filter(c =>
        ["Estimate Sent","Proposal Sent","Quoted","Contacted","Appointment Set"].includes(c.stage)
      );
      if (staleProposals.length > 0) {
        const names = staleProposals.slice(0, 2).map(c => c.name).join(", ");
        const extra = staleProposals.length > 2 ? ` +${staleProposals.length - 2} more` : "";
        important.push(`Follow up on ${staleProposals.length} open estimate${staleProposals.length > 1 ? "s" : ""}/proposal${staleProposals.length > 1 ? "s" : ""}: ${names}${extra}`);
      }

      // Active jobs that can be progressed
      const active = clients.filter(c =>
        ["In Progress","Active","Negotiating","F&I","Test Drive","Editing"].includes(c.stage)
      );
      if (active.length > 0)
        important.push(`Log progress on ${active.length} active ${cfg.projectWord.toLowerCase()}${active.length > 1 ? "s" : ""} — check if any are ready to advance to the next stage`);

      // Follow-up stage clients
      const followUp = clients.filter(c => c.stage === "Follow-Up");
      if (followUp.length > 0)
        important.push(`Re-engage ${followUp.length} ${cfg.clientWord.toLowerCase()}${followUp.length > 1 ? "s" : ""} sitting in Follow-Up — each is a potential reactivation`);

      // Pipeline health
      if (clients.length < 5) {
        growth.push(`Pipeline is thin (${clients.length} ${cfg.clientWord.toLowerCase()}${clients.length !== 1 ? "s" : ""}) — make lead generation your #1 activity today`);
      } else {
        // Find bottleneck stage
        const stageCounts = {};
        cfg.stages.forEach(s => { stageCounts[s] = clients.filter(c => c.stage === s).length; });
        const topStage = cfg.stages.reduce((a, b) => (stageCounts[a] > stageCounts[b] ? a : b));
        if (stageCounts[topStage] > Math.max(3, clients.length * 0.4)) {
          growth.push(`Bottleneck: ${stageCounts[topStage]} ${cfg.clientWord.toLowerCase()}s stuck in "${topStage}" — push them forward or disqualify`);
        }
        // Close rate hint
        const closed = clients.filter(c =>
          ["Paid","Closed","Funded","Delivered","Completed","Final Payment"].includes(c.stage)
        ).length;
        if (clients.length > 4 && closed / clients.length < 0.25) {
          growth.push(`Close rate is low — review your ${staleProposals.length > 0 ? "open estimates and" : ""} follow-up cadence to tighten the pipeline`);
        }
      }

      if (urgent.length === 0 && important.length === 0 && growth.length === 0)

      // Lead suggestions — rotate daily, 2 per day

      const idx = new Date().getDate();
      leads.push(all[idx % all.length]);
      leads.push(all[(idx + 1) % all.length]);

      return { urgent, important, growth, leads };
    };

    // ─────────────────────────────────────────────
    async function streamAI(systemPrompt, userPrompt, onChunk, onDone) {
      const apiKey = localStorage.getItem("bvp_anthropic_key") || "";
      if (!apiKey) {
        onChunk("[No Anthropic API key found. Go to Settings → AI Settings to add your key.]");
        onDone?.(); return;
      }
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true",
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 800, stream: true,
            system: systemPrompt,
            messages: [{ role: "user", content: userPrompt }],
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(()=>({error:{message:res.statusText}}));
          onChunk(`[API Error: ${err?.error?.message || res.statusText}]`);
          onDone?.(); return;
        }
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split("\n"); buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            try {
              const d = JSON.parse(line.slice(6));
              if (d.type === "content_block_delta" && d.delta?.text) onChunk(d.delta.text);
            } catch {}
          }
        }
        onDone?.();
      } catch(e) {
        onChunk("\n[Generation failed — check your connection and API key]");
        onDone?.();
      }
    }

    function ReminderForm({ cfg, onSave, onCancel }) {

        if (!description.trim()) return;
        const n = Math.max(1, Number(days) || 1);
        onSave({
          id: Date.now(),

          repeat,
          nextFire: addDays(todayISO(), n),
          createdAt: todayISO(),
        });
      };

      return (
        <div style={{ background:"#111113", border:`1px solid ${cfg.color}33`, borderRadius:8, padding:14, display:"flex", flexDirection:"column", gap:10, marginTop:8 }}>

    // ─────────────────────────────────────────────
    // AI PANEL
    // ─────────────────────────────────────────────
    function AIPanel({ client, cfg, biz, onClose }) {
      const [activeType, setActiveType] = useState("followup");
      const [output, setOutput] = useState("");
      const [loading, setLoading] = useState(false);
      const [copied, setCopied] = useState(false);
      const outputRef = useRef(null);

      const types = [
        { key:"followup", label:"Follow-Up", icon:"✉️" },
        { key:"payment",  label:"Payment Reminder", icon:"💰" },
        { key:"estimate", label:"Estimate / Proposal", icon:"📋" },
        { key:"review",   label:"Review Request", icon:"⭐" },
      ];

      const buildPrompt = (type) => {
        const base = `Business: ${biz.bizName} (${cfg.aiContext}) in ${biz.city}. Owner: ${biz.ownerName}.
${cfg.clientWord}: ${client.name} | ${client.phone} | ${client.email}
${cfg.projectWord} Type: ${client.jobType} | Stage: ${client.stage} | Value: $${Number(client.value||0).toLocaleString()}
${client.address ? `Address: ${client.address}` : ""}
${cfg.customFields.map(f => client[f.key] ? `${f.label}: ${client[f.key]}` : "").filter(Boolean).join(" | ")}
Notes: ${client.notes || "None"}
${client.history?.length ? `Past work: ${client.history.map(h=>h.desc).join(", ")}` : ""}`;
        return {
          followup: `${base}\n\nWrite a short professional follow-up email (under 120 words). Include subject line. Warm but direct. Sign off as ${biz.ownerName}.`,
          payment:  `${base}\n\nWrite a professional payment reminder email. Invoice: $${Number(client.value||0).toLocaleString()}. Include subject line. Firm but not aggressive. Sign off as ${biz.ownerName}.`,
          estimate: `${base}\n\nWrite a professional estimate/proposal email. Include: scope, investment ($${Number(client.value||0).toLocaleString()}), payment terms, 30-day validity, clear CTA. Include subject line. Sign off as ${biz.ownerName}.`,
          review:   `${base}\n\nWrite a short SMS review request (2-3 sentences). Sound human. End with [Your Google Review Link]. No "amazing" or "delighted".`,
        }[type];
      };

      const generate = async (type) => {
        setOutput(""); setLoading(true); setCopied(false);
        const sys = `You are a professional business communication writer for a ${cfg.aiContext}. Write concise, human-sounding content. No corporate jargon.`;
        await streamAI(sys, buildPrompt(type), (chunk) => {
          setOutput(p => p + chunk);
          if (outputRef.current) outputRef.current.scrollTop = outputRef.current.scrollHeight;
        }, () => setLoading(false));
      };

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.8)", zIndex:200, display:"flex", alignItems:"flex-end", justifyContent:"flex-end", padding:16 }}>
          <style>{`@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }`}</style>
          <div style={{ background:"#111113", border:`1px solid ${cfg.color}44`, borderRadius:14, width:"100%", maxWidth:500, maxHeight:"90vh", display:"flex", flexDirection:"column", overflow:"hidden" }}>
            <div style={{ padding:"16px 20px", borderBottom:"1px solid #27272a", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
              <div>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:18, color:"#fff" }}>AI Content Generator</div>
                <div style={{ fontSize:12, color:"#71717a", marginTop:2 }}>{client.name} · {client.jobType}</div>
              </div>
              <button onClick={onClose} style={{ background:"#18181b", border:"1px solid #27272a", borderRadius:6, width:32, height:32, cursor:"pointer", color:"#a1a1aa", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
            </div>
            <div style={{ display:"flex", borderBottom:"1px solid #27272a", flexShrink:0 }}>
              {types.map(t => (
                <button key={t.key} onClick={() => { setActiveType(t.key); setOutput(""); setCopied(false); }}
                  style={{ flex:1, padding:"10px 4px", background:"transparent", border:"none", borderBottom:activeType===t.key?`2px solid ${cfg.color}`:"2px solid transparent", color:activeType===t.key?cfg.color:"#71717a", fontSize:11, fontWeight:600, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, transition:"all 0.15s" }}>
                  <span style={{ fontSize:16 }}>{t.icon}</span><span>{t.label}</span>
                </button>
              ))}
            </div>
            <div ref={outputRef} style={{ flex:1, overflow:"auto", padding:16, background:"#0d0d0f", minHeight:200, fontFamily:"monospace", fontSize:12.5, lineHeight:1.8, color:"#e4e4e7", whiteSpace:"pre-wrap", wordBreak:"break-word" }}>
              {!output && !loading && <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:160, gap:10, color:"#3f3f46" }}><span style={{ fontSize:30 }}>{types.find(t=>t.key===activeType)?.icon}</span><span style={{ fontSize:13 }}>Click Generate to create content</span></div>}
              {!output && loading && <div style={{ display:"flex", alignItems:"center", gap:10, color:"#71717a", padding:8 }}><span style={{ width:8, height:8, background:cfg.color, borderRadius:"50%", display:"inline-block", animation:"blink 0.8s infinite" }} />Writing...</div>}
              {output}
              {loading && output && <span style={{ color:cfg.color, animation:"blink 0.5s infinite" }}>▋</span>}
            </div>
            <div style={{ padding:14, borderTop:"1px solid #27272a", display:"flex", gap:8, flexShrink:0 }}>
              <button onClick={() => generate(activeType)} disabled={loading}
                style={{ flex:1, background:loading?"#27272a":cfg.color, color:"#fff", border:"none", borderRadius:8, padding:"11px", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:14, letterSpacing:"0.06em", cursor:loading?"not-allowed":"pointer" }}>
                {loading ? "GENERATING..." : output ? "REGENERATE" : "GENERATE"}
              </button>
              {output && !loading && (
                <button onClick={() => navigator.clipboard.writeText(output).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);})}
                  style={{ flex:1, background:copied?"#064e3b":"#18181b", color:copied?"#4ade80":"#fff", border:`1px solid ${copied?"#4ade80":"#27272a"}`, borderRadius:8, padding:"11px", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:14, letterSpacing:"0.06em", cursor:"pointer", transition:"all 0.2s" }}>
                  {copied ? "✓ COPIED" : "COPY"}
                </button>
              )}
            </div>
            <div style={{ padding:"0 14px 12px", fontSize:11, color:"#3f3f46" }}>Review before sending. You send it — AI just drafted it.</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // CLIENT FORM MODAL
    // ─────────────────────────────────────────────
    function ClientForm({ client, cfg, onSave, onClose }) {
      const blank = { name:"", phone:"", email:"", address:"", jobType:cfg.jobTypes[0], stage:cfg.stages[0], value:"", notes:"", tags:[], history:[], reminders:[], created:new Date().toISOString().split("T")[0], ...cfg.customFields.reduce((a,f)=>({...a,[f.key]:""}),{}) };
      const [form, setForm] = useState(client ? { ...blank, ...client } : blank);
      const set = (k,v) => setForm(f=>({...f,[k]:v}));
      const inp = { width:"100%", background:"#18181b", border:"1px solid #27272a", borderRadius:8, padding:"10px 12px", color:"#fff", fontSize:13, outline:"none", fontFamily:"inherit" };
      const lbl = { fontSize:10, fontWeight:600, color:"#71717a", textTransform:"uppercase", letterSpacing:"0.08em", display:"block", marginBottom:5 };
      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.8)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div style={{ background:"#111113", border:"1px solid #27272a", borderRadius:14, width:"100%", maxWidth:580, maxHeight:"92vh", overflow:"auto" }}>
            <div style={{ padding:"20px 24px", borderBottom:"1px solid #27272a", display:"flex", justifyContent:"space-between", alignItems:"center", position:"sticky", top:0, background:"#111113", zIndex:1 }}>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:20, color:"#fff" }}>{client ? `Edit ${cfg.clientWord}` : `Add ${cfg.clientWord}`}</div>
              <button onClick={onClose} style={{ background:"transparent", border:"none", color:"#71717a", fontSize:20, cursor:"pointer" }}>✕</button>
            </div>
            <div style={{ padding:24, display:"flex", flexDirection:"column", gap:13 }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:13 }}>
                <div style={{ gridColumn:"span 2" }}><label style={lbl}>Full Name *</label><input style={inp} value={form.name} onChange={e=>set("name",e.target.value)} placeholder={`${cfg.clientWord} name or company`} /></div>
                <div><label style={lbl}>Phone</label><input style={inp} value={form.phone} onChange={e=>set("phone",e.target.value)} placeholder="555-000-0000" /></div>
                <div><label style={lbl}>Email</label><input style={inp} value={form.email} onChange={e=>set("email",e.target.value)} placeholder="email@example.com" /></div>
                <div style={{ gridColumn:"span 2" }}><label style={lbl}>Address / Location</label><input style={inp} value={form.address} onChange={e=>set("address",e.target.value)} placeholder="Street address or area" /></div>
                <div><label style={lbl}>{cfg.projectWord} Type</label><select style={{ ...inp, cursor:"pointer" }} value={form.jobType} onChange={e=>set("jobType",e.target.value)}>{cfg.jobTypes.map(j=><option key={j}>{j}</option>)}</select></div>
                <div><label style={lbl}>Stage</label><select style={{ ...inp, cursor:"pointer" }} value={form.stage} onChange={e=>set("stage",e.target.value)}>{cfg.stages.map(s=><option key={s}>{s}</option>)}</select></div>
                <div><label style={lbl}>{cfg.projectWord} Value ($)</label><input style={inp} type="number" value={form.value} onChange={e=>set("value",e.target.value)} placeholder="0" /></div>
                <div><label style={lbl}>Date Added</label><input style={inp} type="date" value={form.created} onChange={e=>set("created",e.target.value)} /></div>
                {cfg.customFields.map(f => (<div key={f.key}><label style={lbl}>{f.label}</label><input style={inp} value={form[f.key]||""} onChange={e=>set(f.key,e.target.value)} /></div>))}
                <div style={{ gridColumn:"span 2" }}><label style={lbl}>Notes</label><textarea style={{ ...inp, height:80, resize:"vertical" }} value={form.notes} onChange={e=>set("notes",e.target.value)} placeholder={`Details about this ${cfg.clientWord.toLowerCase()}...`} /></div>
              </div>
              <div style={{ display:"flex", gap:10 }}>
                <button disabled={!form.name} onClick={() => onSave(form)}
                  style={{ flex:1, background:form.name?cfg.color:"#27272a", color:form.name?"#fff":"#52525b", border:"none", borderRadius:8, padding:"12px", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:14, letterSpacing:"0.06em", cursor:form.name?"pointer":"not-allowed" }}>
                  {client ? "SAVE CHANGES" : `ADD ${cfg.clientWord.toUpperCase()}`}
                </button>
                <button onClick={onClose} style={{ background:"transparent", border:"1px solid #27272a", borderRadius:8, padding:"12px 20px", color:"#a1a1aa", fontSize:13, cursor:"pointer" }}>Cancel</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // MAIN CRM APP
    // ─────────────────────────────────────────────
    function CRMApp({ workspace, onWorkspaceUpdate, workspaces, onSwitchWorkspace, onAddWorkspace, user, onSignOut, demoMode }) {
      const cfg = INDUSTRIES[workspace.industry];
      const [clients, setClients] = useState(workspace.clients || []);
      const [view, setView] = useState("clients");
      const [selected, setSelected] = useState(null);
      const [aiOpen, setAiOpen] = useState(false);
      const [formOpen, setFormOpen] = useState(false);
      const [editTarget, setEditTarget] = useState(null);
      const [search, setSearch] = useState("");
      const [stageFilter, setStageFilter] = useState("All");
      const [sortBy, setSortBy] = useState("created");
      const [showReminderForm, setShowReminderForm] = useState(false);
      // Settings
      const [apiKey, setApiKey] = useState(() => localStorage.getItem("bvp_anthropic_key") || "");
      const [settingsBizName, setSettingsBizName] = useState(workspace.bizName);
      const [settingsOwnerName, setSettingsOwnerName] = useState(workspace.ownerName);
      const [settingsCity, setSettingsCity] = useState(workspace.city);
      const [settingsSaved, setSettingsSaved] = useState(false);

      // Close reminder form when selected client changes
      useEffect(() => { setShowReminderForm(false); }, [selected?.id]);

      const updateClients = useCallback((newClients) => {
        setClients(newClients);
        onWorkspaceUpdate({ ...workspace, clients: newClients });
      }, [workspace, onWorkspaceUpdate]);

      // ── Client CRUD ──
      const saveClient = (form) => {
        let newClients;
        if (form.id) {
          const updated = { ...form, reminders: form.reminders || [] };
          newClients = clients.map(c => c.id === form.id ? updated : c);
          setSelected(updated);
        } else {
          const newC = { ...form, id: Date.now(), history: [], reminders: [] };
          newClients = [...clients, newC];
        }
        updateClients(newClients);
        setFormOpen(false); setEditTarget(null);
      };

      const deleteClient = (id) => {
        if (!confirm("Delete this record? This cannot be undone.")) return;
        updateClients(clients.filter(c => c.id !== id));
        setSelected(null);
      };

      const updateStage = (id, stage) => {
        updateClients(clients.map(c => c.id===id ? {...c, stage} : c));
        if (selected?.id === id) setSelected(s => ({...s, stage}));
      };

      // ── Reminder CRUD ──
      const addReminder = (clientId, reminder) => {
        const newClients = clients.map(c => c.id===clientId ? {...c, reminders:[...(c.reminders||[]),reminder]} : c);
        updateClients(newClients);
        if (selected?.id === clientId) setSelected(newClients.find(c=>c.id===clientId));
      };

      const dismissReminder = (clientId, reminderId) => {
        const newClients = clients.map(c => {
          if (c.id !== clientId) return c;
          const r = (c.reminders||[]).find(r=>r.id===reminderId);
          if (!r) return c;
          const newReminders = r.repeat
            ? (c.reminders||[]).map(rem => rem.id===reminderId ? {...rem, nextFire: addDays(todayISO(), rem.daysInterval)} : rem)
            : (c.reminders||[]).filter(rem => rem.id!==reminderId);
          return { ...c, reminders: newReminders };
        });
        updateClients(newClients);
        if (selected?.id === clientId) setSelected(newClients.find(c=>c.id===clientId));
      };

      const deleteReminder = (clientId, reminderId) => {
        const newClients = clients.map(c => c.id===clientId ? {...c, reminders:(c.reminders||[]).filter(r=>r.id!==reminderId)} : c);
        updateClients(newClients);
        if (selected?.id === clientId) setSelected(newClients.find(c=>c.id===clientId));
      };

      // ── Settings ──
      const saveSettings = () => {
        localStorage.setItem("bvp_anthropic_key", apiKey);
        onWorkspaceUpdate({ ...workspace, clients, bizName:settingsBizName, ownerName:settingsOwnerName, city:settingsCity });
        setSettingsSaved(true); setTimeout(() => setSettingsSaved(false), 2200);
      };

      const deleteWorkspace = () => {
        if (workspaces.length < 2) { alert("You can't delete your only business. Add another first."); return; }
        if (!confirm(`Delete "${workspace.bizName}" and all its data? This is permanent.`)) return;
        const remaining = workspaces.filter(w => w.id !== workspace.id);
        onSwitchWorkspace(remaining[0].id, true);
      };

      // ── Derived data ──
      const today = todayISO();

      const dueReminders = [];
      clients.forEach(c => {
        (c.reminders||[]).forEach(r => { if (r.nextFire <= today) dueReminders.push({ client:c, reminder:r }); });
      });
      const totalReminders = clients.reduce((s,c) => s + (c.reminders||[]).length, 0);

      const report = generateTodayReport(clients, cfg, workspace.industry);

      const filtered = clients.filter(c => {
        const q = search.toLowerCase();
        const matchQ = !q || c.name.toLowerCase().includes(q) || c.email?.toLowerCase().includes(q) || c.jobType?.toLowerCase().includes(q) || c.phone?.includes(q);
        const matchS = stageFilter==="All" || c.stage===stageFilter;
        return matchQ && matchS;
      }).sort((a,b) => {
        if (sortBy==="value") return Number(b.value||0)-Number(a.value||0);
        if (sortBy==="name") return a.name.localeCompare(b.name);
        return new Date(b.created||0)-new Date(a.created||0);
      });

      const totalPipeline = clients.reduce((s,c)=>s+Number(c.value||0),0);
      const activeCount = clients.filter(c=>["In Progress","Active","Scheduled","Booked","Confirmed","Negotiating","F&I","Test Drive"].includes(c.stage)).length;
      const paidCount = clients.filter(c=>["Paid","Closed","Completed","Final Payment","Funded","Delivered"].includes(c.stage)).length;
      const pendingPayment = clients.filter(c=>["Invoice Sent","Completed","Gallery Delivered","Deal Signed","Delivery Scheduled"].includes(c.stage));
      const needsFollowUp = clients.filter(c=>["Estimate Sent","Proposal Sent","Quoted","Follow-Up","New Lead","Inquiry","Contacted","Appointment Set"].includes(c.stage));

      const NAV = [
        { key:"dashboard", label:"Dashboard", icon:"◈" },
        { key:"clients",   label:cfg.clientWord+"s", icon:"⊕" },
        { key:"pipeline",  label:"Pipeline", icon:"▦" },
        { key:"settings",  label:"Settings", icon:"⚙" },
      ];

      const inp = { background:"#111113", border:"1px solid #27272a", borderRadius:8, padding:"9px 12px", color:"#fff", fontSize:13, outline:"none", fontFamily:"inherit" };
      const lbl = { fontSize:10, fontWeight:600, color:"#52525b", textTransform:"uppercase", letterSpacing:"0.08em", display:"block", marginBottom:6 };
      const settInp = { width:"100%", background:"#18181b", border:"1px solid #27272a", borderRadius:8, padding:"10px 12px", color:"#fff", fontSize:13, outline:"none", fontFamily:"inherit" };

      return (
        <div style={{ display:"flex", flexDirection:"column", height:"100vh", fontFamily:"'DM Sans','Helvetica Neue',sans-serif", background:"#09090a", color:"#fff", overflow:"hidden" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap');
            * { box-sizing:border-box; }
            ::-webkit-scrollbar{width:4px;height:4px} ::-webkit-scrollbar-track{background:#09090a} ::-webkit-scrollbar-thumb{background:#27272a;border-radius:4px}
            .row-hover:hover { background:#111113 !important; }
            .card-hover:hover { border-color:${cfg.color}66 !important; }
            .nav-item:hover { color:#fff !important; background:#111113 !important; }
            select option { background:#18181b; }
            input:focus, select:focus, textarea:focus { border-color:${cfg.color}88 !important; }
            .report-row { padding:7px 0; border-bottom:1px solid #1a1a1e; display:flex; gap:10; align-items:flex-start; }
            .report-row:last-child { border-bottom:none; }
          `}</style>

          {demoMode && (
            <div style={{ background:"rgba(255,107,0,0.1)", borderBottom:"1px solid rgba(255,107,0,0.25)", padding:"5px 20px", fontSize:11, color:"#fb923c", textAlign:"center", flexShrink:0 }}>
              🔧 Demo Mode — Supabase not configured. Data saves locally only.
            </div>
          )}

          {/* ── Topbar ── */}
          <div style={{ height:52, background:"#0d0d0f", borderBottom:"1px solid #1f1f23", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 16px", flexShrink:0, gap:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, minWidth:0 }}>
              <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:17, color:"#ff6b00", letterSpacing:"0.08em", flexShrink:0 }}>BVP</span>
              <span style={{ width:1, height:18, background:"#27272a", flexShrink:0 }} />
              <WorkspaceSwitcher workspaces={workspaces} activeId={workspace.id} onSwitch={onSwitchWorkspace} onAdd={onAddWorkspace} />
            </div>
            <div style={{ display:"flex", gap:8, alignItems:"center", flexShrink:0 }}>
              {dueReminders.length > 0 && (
                <button onClick={() => setView("dashboard")}
                  style={{ background:"rgba(251,191,36,0.12)", border:"1px solid rgba(251,191,36,0.3)", borderRadius:6, padding:"4px 10px", color:"#fbbf24", fontSize:11, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:5 }}>
                  📅 {dueReminders.length} due
                </button>
              )}
              <span style={{ background:cfg.colorDim, color:cfg.color, border:`1px solid ${cfg.color}44`, borderRadius:6, padding:"3px 9px", fontSize:11, fontWeight:700, letterSpacing:"0.06em" }}>{cfg.icon} {cfg.label.toUpperCase()}</span>
              <button onClick={() => { setEditTarget(null); setFormOpen(true); }}
                style={{ background:cfg.color, border:"none", borderRadius:8, padding:"6px 14px", color:"#fff", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:13, letterSpacing:"0.06em", cursor:"pointer" }}>
                + ADD {cfg.clientWord.toUpperCase()}
              </button>
              {!demoMode && user && (
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:11, color:"#52525b", maxWidth:140, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{user.email}</span>
                  <button onClick={onSignOut} style={{ background:"transparent", border:"1px solid #27272a", borderRadius:7, padding:"5px 11px", color:"#71717a", fontSize:11, cursor:"pointer" }}>Sign Out</button>
                </div>
              )}
            </div>
          </div>

          <div style={{ display:"flex", flex:1, overflow:"hidden" }}>
            {/* ── Sidebar ── */}
            <div style={{ width:176, background:"#0d0d0f", borderRight:"1px solid #1f1f23", display:"flex", flexDirection:"column", flexShrink:0, padding:"10px 0" }}>
              {NAV.map(n => (
                <button key={n.key} className="nav-item" onClick={() => setView(n.key)}
                  style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 16px", background:view===n.key?cfg.colorDim:"transparent", borderLeft:`2px solid ${view===n.key?cfg.color:"transparent"}`, border:"none", color:view===n.key?cfg.color:"#71717a", fontSize:13, fontWeight:view===n.key?600:400, cursor:"pointer", textAlign:"left", width:"100%", transition:"all 0.12s" }}>
                  <span style={{ fontFamily:"monospace", fontSize:14 }}>{n.icon}</span>
                  {n.label}
                  {n.key==="dashboard" && dueReminders.length > 0 && <span style={{ marginLeft:"auto", background:"#fbbf24", color:"#09090a", borderRadius:"50%", width:16, height:16, fontSize:9, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center" }}>{dueReminders.length}</span>}
                </button>
              ))}
              <div style={{ margin:"10px 16px", height:1, background:"#1f1f23" }} />
              {[["Total",clients.length,"#a1a1aa"],["Active",activeCount,cfg.color],["Pipeline",`$${totalPipeline>=1000?(totalPipeline/1000).toFixed(1)+"k":totalPipeline.toLocaleString()}`,"#4ade80"],["Paid",paidCount,"#4ade80"]].map(([l,v,c])=>(
                <div key={l} style={{ display:"flex", justifyContent:"space-between", padding:"3px 16px" }}>
                  <span style={{ fontSize:11, color:"#52525b" }}>{l}</span>
                  <span style={{ fontSize:11, fontWeight:700, color:c }}>{v}</span>
                </div>
              ))}
              {totalReminders > 0 && (
                <div style={{ display:"flex", justifyContent:"space-between", padding:"3px 16px" }}>
                  <span style={{ fontSize:11, color:"#52525b" }}>Reminders</span>
                  <span style={{ fontSize:11, fontWeight:700, color: dueReminders.length > 0 ? "#fbbf24" : "#71717a" }}>{dueReminders.length > 0 ? `${dueReminders.length} due` : totalReminders}</span>
                </div>
              )}
              <div style={{ flex:1 }} />
              <div style={{ padding:"10px 16px", borderTop:"1px solid #1f1f23" }}>
                <div style={{ fontSize:9, color:"#3f3f46", marginBottom:1 }}>Powered by</div>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:12, color:"#ff6b00" }}>BOT VAULT PRO</div>
              </div>
            </div>

            {/* ── Main Content ── */}
            <div style={{ flex:1, overflow:"auto", padding:20, display:"flex", flexDirection:"column", gap:18 }}>

              {/* ═══ DASHBOARD ═══ */}
              {view==="dashboard" && (
                <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
                  <div>
                    <h2 style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:26, margin:"0 0 2px" }}>Hey, {workspace.ownerName} 👋</h2>

                  </div>

                  {/* Stat cards */}
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12 }}>
                    {[
                      { label:`Total ${cfg.clientWord}s`, val:clients.length, color:cfg.color, sub:"in your CRM" },
                      { label:"Pipeline Value", val:`$${totalPipeline.toLocaleString()}`, color:"#4ade80", sub:"open + active" },
                      { label:"Active", val:activeCount, color:cfg.color, sub:`${cfg.projectWord}s in progress` },
                      { label:"Closed / Paid", val:paidCount, color:"#4ade80", sub:"completed" },
                    ].map(({label,val,color,sub})=>(
                      <div key={label} className="card-hover" style={{ background:"#111113", border:"1px solid #1f1f23", borderRadius:10, padding:"14px 16px" }}>
                        <div style={{ fontSize:24, fontWeight:800, color, fontFamily:"'Barlow Condensed',sans-serif", marginBottom:2 }}>{val}</div>
                        <div style={{ fontSize:13, fontWeight:600, color:"#e4e4e7" }}>{label}</div>
                        <div style={{ fontSize:11, color:"#52525b", marginTop:2 }}>{sub}</div>
                      </div>
                    ))}
                  </div>

                  {/* Follow-Up + Awaiting Payment */}
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>

                                  {(c.reminders||[]).some(r=>r.nextFire<=today) && <span style={{ fontSize:9, color:"#fbbf24" }}>📅</span>}
                                </div>
                                <div style={{ fontSize:11, color:"#71717a", marginBottom:c.value?5:0 }}>{c.jobType}</div>
                                {c.value > 0 && <div style={{ fontSize:12, fontWeight:700, color:"#4ade80" }}>${Number(c.value).toLocaleString()}</div>}
                              </div>
                            ))}
                            {col.length===0 && <div style={{ color:"#3f3f46", fontSize:12, textAlign:"center", padding:"14px 0" }}>—</div>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* ═══ SETTINGS ═══ */}
              {view==="settings" && (
                <div style={{ display:"flex", flexDirection:"column", gap:20, maxWidth:560 }}>
                  <div>
                    <h2 style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:24, margin:"0 0 4px" }}>Settings</h2>
                    <p style={{ color:"#71717a", fontSize:13, margin:0 }}>{workspace.bizName} · {INDUSTRIES[workspace.industry].label}</p>
                  </div>
                  <div style={{ background:"#111113", border:"1px solid #1f1f23", borderRadius:10, padding:20 }}>
                    <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:15, color:"#e4e4e7", marginBottom:16 }}>🏢 Business Info</div>
                    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                      <div><label style={lbl}>Business Name</label><input style={settInp} value={settingsBizName} onChange={e=>setSettingsBizName(e.target.value)} /></div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                        <div><label style={lbl}>Your Name</label><input style={settInp} value={settingsOwnerName} onChange={e=>setSettingsOwnerName(e.target.value)} /></div>
                        <div><label style={lbl}>City / Market</label><input style={settInp} value={settingsCity} onChange={e=>setSettingsCity(e.target.value)} /></div>
                      </div>
                    </div>
                  </div>
                  <div style={{ background:"#111113", border:"1px solid #1f1f23", borderRadius:10, padding:20 }}>
                    <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:15, color:"#e4e4e7", marginBottom:6 }}>⚡ AI Configuration</div>
                    <p style={{ color:"#52525b", fontSize:12, marginBottom:14, lineHeight:1.6 }}>Enter your Anthropic API key to enable AI content generation. Stored only in your browser — never shared.</p>
                    <label style={lbl}>Anthropic API Key</label>
                    <input type="password" style={{ ...settInp, fontFamily:"monospace" }} value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..." />
                    <p style={{ fontSize:11, color:"#3f3f46", marginTop:8 }}>Get your key at <span style={{ color:"#71717a" }}>console.anthropic.com</span> → API Keys.</p>
                  </div>
                  <button onClick={saveSettings}
                    style={{ background:settingsSaved?"#064e3b":cfg.color, color:settingsSaved?"#4ade80":"#fff", border:settingsSaved?"1px solid #4ade80":"none", borderRadius:8, padding:"12px", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:14, letterSpacing:"0.06em", cursor:"pointer", transition:"all 0.2s", alignSelf:"flex-start", minWidth:160 }}>
                    {settingsSaved ? "✓ SAVED" : "SAVE CHANGES"}
                  </button>
                  {!demoMode && user && (
                    <div style={{ background:"#111113", border:"1px solid #1f1f23", borderRadius:10, padding:20 }}>
                      <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:15, color:"#e4e4e7", marginBottom:12 }}>👤 Account</div>
                      <div style={{ fontSize:13, color:"#a1a1aa", marginBottom:14 }}>Signed in as <span style={{ color:"#fff" }}>{user.email}</span></div>
                      <button onClick={onSignOut} style={{ background:"transparent", border:"1px solid #27272a", borderRadius:7, padding:"8px 16px", color:"#71717a", fontSize:12, cursor:"pointer" }}>Sign Out</button>
                    </div>
                  )}
                  <div style={{ background:"rgba(239,68,68,0.05)", border:"1px solid rgba(239,68,68,0.2)", borderRadius:10, padding:20 }}>
                    <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:15, color:"#f87171", marginBottom:8 }}>⚠️ Danger Zone</div>
                    <p style={{ fontSize:12, color:"#71717a", marginBottom:14 }}>Permanently delete this business and all associated client data. Cannot be undone.</p>
                    <button onClick={deleteWorkspace} style={{ background:"rgba(239,68,68,0.1)", border:"1px solid rgba(239,68,68,0.3)", borderRadius:7, padding:"8px 16px", color:"#f87171", fontSize:12, cursor:"pointer" }}>Delete "{workspace.bizName}"</button>
                  </div>
                </div>
              )}
            </div>
          </div>

          {aiOpen && selected && <AIPanel client={selected} cfg={cfg} biz={workspace} onClose={() => setAiOpen(false)} />}
          {formOpen && <ClientForm client={editTarget} cfg={cfg} onSave={saveClient} onClose={() => { setFormOpen(false); setEditTarget(null); }} />}
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // ROOT APP  —  auth + data management
    // ─────────────────────────────────────────────
    function App() {
      const [authState, setAuthState] = useState(SB_READY ? "loading" : "demo");
      const [user, setUser] = useState(null);
      const [userData, setUserData] = useState(null);
      const [showSetup, setShowSetup] = useState(false);
      const saveTimer = useRef(null);

      const migrateFromLegacy = () => {
        try {
          const raw = localStorage.getItem(LEGACY_KEY);
          if (!raw) return null;
          const old = JSON.parse(raw);
          if (!old.industry || !old.clients) return null;
          const id = String(Date.now());
          return { workspaces:[{ id, industry:old.industry, bizName:"My Business", ownerName:"Owner", city:"", clients:old.clients.map(c=>({...c,reminders:c.reminders||[]})), createdAt:new Date().toISOString() }], activeWorkspaceId:id };
        } catch { return null; }
      };

      const persistData = useCallback((newData) => {
        setUserData(newData);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(newData));
        if (sb && user) {
          clearTimeout(saveTimer.current);
          saveTimer.current = setTimeout(async () => {
            try { await sb.from("crm_data").upsert({ user_id:user.id, data:newData, updated_at:new Date().toISOString() }, { onConflict:"user_id" }); }
            catch(e) { console.warn("Supabase save failed:", e); }
          }, 900);
        }
      }, [user]);

      const loadUserData = useCallback(async (uid) => {
        if (sb && uid) {
          try {
            const { data, error } = await sb.from("crm_data").select("data").eq("user_id",uid).single();
            if (!error && data?.data?.workspaces?.length) { setUserData(data.data); return; }
          } catch {}
        }
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) { const parsed = JSON.parse(raw); if (parsed?.workspaces?.length) { setUserData(parsed); return; } }
        } catch {}
        const migrated = migrateFromLegacy();
        if (migrated) { setUserData(migrated); return; }
        setUserData({ workspaces:[], activeWorkspaceId:null });
      }, []);

      useEffect(() => {
        if (!SB_READY) { loadUserData(null); return; }
        sb.auth.getSession().then(({ data: { session } }) => {
          if (session) { setUser(session.user); setAuthState("authed"); loadUserData(session.user.id); }
          else { setAuthState("unauthed"); }
        });
        const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
          if (session) { setUser(session.user); setAuthState("authed"); loadUserData(session.user.id); }
          else { setUser(null); setUserData(null); setAuthState("unauthed"); }
        });
        return () => subscription.unsubscribe();
      }, []);

      const handleFirstSetup = (biz) => {
        const id = String(Date.now());
        persistData({ workspaces:[{ id, ...biz, clients:makeSamples(biz.industry), createdAt:new Date().toISOString() }], activeWorkspaceId:id });
      };

      const handleAddWorkspace = (biz) => {
        const id = String(Date.now());
        persistData({ workspaces:[...(userData?.workspaces||[]), { id, ...biz, clients:makeSamples(biz.industry), createdAt:new Date().toISOString() }], activeWorkspaceId:id });
        setShowSetup(false);
      };

      const handleSwitchWorkspace = (id, deleteCurrent) => {
        let ws = userData.workspaces;
        if (deleteCurrent) ws = ws.filter(w => w.id !== userData.activeWorkspaceId);
        const newId = deleteCurrent ? (ws[0]?.id || id) : id;
        persistData({ workspaces:ws, activeWorkspaceId:newId });
      };

      const handleWorkspaceUpdate = useCallback((updated) => {
        if (!userData) return;
        persistData({ ...userData, workspaces:userData.workspaces.map(w => w.id===updated.id ? updated : w) });
      }, [userData, persistData]);

      const handleSignOut = async () => {
        if (sb) await sb.auth.signOut();
        setUser(null); setUserData(null); setAuthState("unauthed");
      };

      if (authState === "loading") return <LoadingScreen />;
      if (SB_READY && authState === "unauthed") return <AuthScreen />;

      const demoMode = !SB_READY;

      if (!userData || userData.workspaces.length === 0)
        return <SetupScreen onComplete={handleFirstSetup} />;

      const activeWorkspace = userData.workspaces.find(w => w.id === userData.activeWorkspaceId) || userData.workspaces[0];

      return (
        <>
          <CRMApp
            key={activeWorkspace.id}
            workspace={activeWorkspace}
            onWorkspaceUpdate={handleWorkspaceUpdate}
            workspaces={userData.workspaces}
            onSwitchWorkspace={handleSwitchWorkspace}
            onAddWorkspace={() => setShowSetup(true)}
            user={user}
            onSignOut={handleSignOut}
            demoMode={demoMode}
          />
          {showSetup && <SetupScreen isModal={true} onComplete={handleAddWorkspace} onClose={() => setShowSetup(false)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
