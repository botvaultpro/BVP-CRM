<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{{ page.title | default: site.title }}</title>
<!-- Instantly apply saved theme before CSS renders to avoid flash -->
<script>
(function(){var t=localStorage.getItem('bvp-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ '/assets/css/themes.css' | relative_url }}"/>
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}"/>
<script src="{{ '/assets/js/app.js' | relative_url }}" defer></script>
